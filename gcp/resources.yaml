apiVersion: v1
kind: Service
metadata:
  name: gcp-placeholder
  labels:
    app.kubernetes.io/name: gcp-placeholder
    app.kubernetes.io/part-of: progressive-sync-poc
spec:
  selector:
    app.kubernetes.io/name: gcp-placeholder
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcp-placeholder
  labels:
    app.kubernetes.io/name: gcp-placeholder
    app.kubernetes.io/part-of: progressive-sync-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gcp-placeholder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gcp-placeholder
        app.kubernetes.io/part-of: progressive-sync-poc
    spec:
      initContainers:
        - name: simulate-provisioning
          image: busybox:1.36
          command: ["sh", "-c", "sleep 9"]
      containers:
        - name: placeholder
          image: hashicorp/http-echo:1.0.0
          args: ["-text=gcp resources provisioned", "-listen=:8080"]
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
