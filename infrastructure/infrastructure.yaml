apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  labels:
    app.kubernetes.io/name: postgres-db
    app.kubernetes.io/part-of: progressive-sync-poc
spec:
  selector:
    app.kubernetes.io/name: postgres-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  labels:
    app.kubernetes.io/name: postgres-db
    app.kubernetes.io/part-of: progressive-sync-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-db
        app.kubernetes.io/part-of: progressive-sync-poc
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: orders
            - name: POSTGRES_USER
              value: demo
            - name: POSTGRES_PASSWORD
              value: demo
          ports:
            - containerPort: 5432
              name: postgres
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U demo -d orders"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U demo -d orders"]
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-db
  labels:
    app.kubernetes.io/name: mongo-db
    app.kubernetes.io/part-of: progressive-sync-poc
spec:
  selector:
    app.kubernetes.io/name: mongo-db
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-db
  labels:
    app.kubernetes.io/name: mongo-db
    app.kubernetes.io/part-of: progressive-sync-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongo-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongo-db
        app.kubernetes.io/part-of: progressive-sync-poc
    spec:
      containers:
        - name: mongo
          image: mongo:7.0
          args:
            - --bind_ip_all
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: demo
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: demo
          ports:
            - containerPort: 27017
              name: mongodb
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mongosh --quiet --host localhost --username demo --password demo --authenticationDatabase admin --eval "db.adminCommand('ping').ok"
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mongosh --quiet --host localhost --username demo --password demo --authenticationDatabase admin --eval "db.adminCommand('ping').ok"
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data/db
      volumes:
        - name: data
          emptyDir: {}
