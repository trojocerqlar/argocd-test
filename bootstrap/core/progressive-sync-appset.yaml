apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: progressive-sync-poc
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  strategy:
    type: RollingSync
    deletionOrder: Reverse
    rollingSync:
      steps:
        - matchExpressions:
            - key: stage
              operator: In
              values:
                - database
          maxUpdate: 2
        - matchExpressions:
            - key: stage
              operator: In
              values:
                - backend
          maxUpdate: 2
        - matchExpressions:
            - key: stage
              operator: In
              values:
                - frontend
          maxUpdate: 1
  generators:
    - list:
        elements:
          - name: postgres-db
            stage: database
            sourceType: directory
            path: apps/databases-postgres
          - name: mongo-db
            stage: database
            sourceType: directory
            path: apps/databases-mongo
          - name: orders-api
            stage: backend
            sourceType: helm
            chartRepo: https://charts.bitnami.com/bitnami
            chartName: nginx
            chartVersion: 22.4.3
            valuesFile: values/backends/orders-api.yaml
          - name: users-api
            stage: backend
            sourceType: helm
            chartRepo: https://charts.bitnami.com/bitnami
            chartName: nginx
            chartVersion: 22.4.3
            valuesFile: values/backends/users-api.yaml
          - name: payments-api
            stage: backend
            sourceType: helm
            chartRepo: https://charts.bitnami.com/bitnami
            chartName: nginx
            chartVersion: 22.4.3
            valuesFile: values/backends/payments-api.yaml
          - name: catalog-api
            stage: backend
            sourceType: helm
            chartRepo: https://charts.bitnami.com/bitnami
            chartName: nginx
            chartVersion: 22.4.3
            valuesFile: values/backends/catalog-api.yaml
          - name: web-ui
            stage: frontend
            sourceType: helm
            chartRepo: https://charts.bitnami.com/bitnami
            chartName: nginx
            chartVersion: 22.4.3
            valuesFile: values/frontends/web-ui.yaml
          - name: admin-ui
            stage: frontend
            sourceType: helm
            chartRepo: https://charts.bitnami.com/bitnami
            chartName: nginx
            chartVersion: 22.4.3
            valuesFile: values/frontends/admin-ui.yaml
          - name: support-ui
            stage: frontend
            sourceType: helm
            chartRepo: https://charts.bitnami.com/bitnami
            chartName: nginx
            chartVersion: 22.4.3
            valuesFile: values/frontends/support-ui.yaml
  template:
    metadata:
      name: '{{name}}'
      labels:
        stage: '{{stage}}'
    spec:
      project: progressive-sync-poc
      destination:
        server: https://kubernetes.default.svc
        namespace: progressive-sync-poc
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
  templatePatch: |
    {{- if eq .sourceType "directory" }}
    spec:
      source:
        repoURL: https://github.com/YOUR_ORG/argocd-progressive-sync-poc.git
        targetRevision: HEAD
        path: {{ .path }}
    {{- else if eq .sourceType "helm" }}
    spec:
      sources:
        - repoURL: {{ .chartRepo }}
          chart: {{ .chartName }}
          targetRevision: {{ .chartVersion }}
          helm:
            releaseName: {{ .name }}
            valueFiles:
              - $values/{{ .valuesFile }}
        - repoURL: https://github.com/YOUR_ORG/argocd-progressive-sync-poc.git
          targetRevision: HEAD
          ref: values
    {{- end }}
