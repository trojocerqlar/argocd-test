apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: progressive-sync-poc
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  strategy:
    type: RollingSync
    deletionOrder: Reverse
    rollingSync:
      steps:
        - matchExpressions:
            - key: stage
              operator: In
              values:
                - infrastructure
          maxUpdate: 1
        - matchExpressions:
            - key: stage
              operator: In
              values:
                - backend
          maxUpdate: 2
        - matchExpressions:
            - key: stage
              operator: In
              values:
                - frontend
          maxUpdate: 1
  generators:
    - list:
        elements:
          - name: infrastructure
            stage: infrastructure
            sourceType: directory
            path: infrastructure
          - name: orders-api
            stage: backend
            sourceType: helm
            chartName: nginx
            chartVersion: 22.4.3
          - name: users-api
            stage: backend
            sourceType: helm
            chartName: nginx
            chartVersion: 22.4.3
          - name: payments-api
            stage: backend
            sourceType: helm
            chartName: nginx
            chartVersion: 22.4.3
          - name: catalog-api
            stage: backend
            sourceType: helm
            chartName: nginx
            chartVersion: 22.4.3
          - name: web-ui
            stage: frontend
            sourceType: helm
            chartName: nginx
            chartVersion: 22.4.3
          - name: admin-ui
            stage: frontend
            sourceType: helm
            chartName: nginx
            chartVersion: 22.4.3
          - name: support-ui
            stage: frontend
            sourceType: helm
            chartName: nginx
            chartVersion: 22.4.3
  template:
    metadata:
      name: '{{.name}}'
      labels:
        stage: '{{.stage}}'
    spec:
      project: progressive-sync-poc
      destination:
        server: https://kubernetes.default.svc
        namespace: progressive-sync-poc
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
  templatePatch: |
    {{- if eq .sourceType "directory" }}
    spec:
      source:
        repoURL: https://github.com/trojocerqlar/argocd-test
        targetRevision: HEAD
        path: {{ .path }}
    {{- else if eq .sourceType "helm" }}
    spec:
      sources:
        - repoURL: https://charts.bitnami.com/bitnami
          chart: {{ .chartName }}
          targetRevision: {{ .chartVersion }}
          helm:
            releaseName: {{ .name }}
            valueFiles:
              - $services/services/{{ .stage }}/{{ .name }}/values.yaml
        - repoURL: https://github.com/trojocerqlar/argocd-test
          targetRevision: HEAD
          ref: services
    {{- end }}
