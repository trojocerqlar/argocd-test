apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: progressive-sync-poc
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  syncPolicy:
    preserveResourcesOnDeletion: true
  strategy:
    type: RollingSync
    deletionOrder: Reverse
    rollingSync:
      steps:
        - matchExpressions:
            - key: stage
              operator: In
              values:
                - gcp
        - matchExpressions:
            - key: stage
              operator: In
              values:
                - infrastructure
        - matchExpressions:
            - key: stage
              operator: In
              values:
                - backend
        - matchExpressions:
            - key: stage
              operator: In
              values:
                - frontend
        - matchExpressions:
            - key: stage
              operator: In
              values:
                - outbox
  generators:
    - list:
        elements:
          - name: gcp
            stage: gcp
            sourceType: directory
            path: gcp
          - name: infrastructure
            stage: infrastructure
            sourceType: directory
            path: infrastructure
          - name: trades-service
            stage: backend
            sourceType: helm
            chartName: nginx
            chartVersion: 22.4.3
          - name: inventory-service
            stage: backend
            sourceType: helm
            chartName: nginx
            chartVersion: 22.4.3
          - name: membership-service
            stage: backend
            sourceType: helm
            chartName: nginx
            chartVersion: 22.4.3
          - name: ecolabel-service
            stage: backend
            sourceType: helm
            chartName: nginx
            chartVersion: 22.4.3
          - name: ui
            stage: frontend
            sourceType: helm
            chartName: nginx
            chartVersion: 22.4.3
          - name: inventory-ui
            stage: frontend
            sourceType: helm
            chartName: nginx
            chartVersion: 22.4.3
          - name: ecolabel-ui
            stage: frontend
            sourceType: helm
            chartName: nginx
            chartVersion: 22.4.3
          - name: inventory-outbox
            stage: outbox
            sourceType: helm
            chartName: inventory-outbox
            chartName: nginx
            chartVersion: 22.4.3
  template:
    metadata:
      name: '{{.name}}'
      labels:
        stage: '{{.stage}}'
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: app
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
  templatePatch: |
    {{- if eq .sourceType "directory" }}
    spec:
      source:
        repoURL: https://github.com/trojocerqlar/argocd-test
        targetRevision: HEAD
        path: {{ .path }}
    {{- else if eq .sourceType "helm" }}
    spec:
      sources:
        - repoURL: https://charts.bitnami.com/bitnami
          chart: {{ .chartName }}
          targetRevision: {{ .chartVersion }}
          helm:
            releaseName: {{ .name }}
            valueFiles:
              - $services/services/{{ .stage }}/{{ .name }}/values.yaml
        - repoURL: https://github.com/trojocerqlar/argocd-test
          targetRevision: HEAD
          ref: services
    {{- end }}
