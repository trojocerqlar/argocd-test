apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: progressive-sync-poc
  namespace: argocd
spec:
  description: Progressive sync proof of concept for Argo CD 3.3.3
  sourceRepos:
    - '*'
  destinations:
    - namespace: progressive-sync-poc
      server: https://kubernetes.default.svc
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
