apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: progressive-sync-poc-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/trojocerqlar/argocd-test
    targetRevision: HEAD
    path: bootstrap/core
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
