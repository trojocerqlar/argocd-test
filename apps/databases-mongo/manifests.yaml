apiVersion: v1
kind: Service
metadata:
  name: mongo-db
  labels:
    app.kubernetes.io/name: mongo-db
    app.kubernetes.io/part-of: progressive-sync-poc
spec:
  selector:
    app.kubernetes.io/name: mongo-db
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-db
  labels:
    app.kubernetes.io/name: mongo-db
    app.kubernetes.io/part-of: progressive-sync-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongo-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongo-db
        app.kubernetes.io/part-of: progressive-sync-poc
    spec:
      containers:
        - name: mongo
          image: mongo:7.0
          args:
            - --bind_ip_all
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: demo
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: demo
          ports:
            - containerPort: 27017
              name: mongodb
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mongosh --quiet --host localhost --username demo --password demo --authenticationDatabase admin --eval "db.adminCommand('ping').ok"
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mongosh --quiet --host localhost --username demo --password demo --authenticationDatabase admin --eval "db.adminCommand('ping').ok"
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data/db
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-db-seed
  labels:
    app.kubernetes.io/name: mongo-db-seed
    app.kubernetes.io/part-of: progressive-sync-poc
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongo-db-seed
        app.kubernetes.io/part-of: progressive-sync-poc
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: mongo:7.0
          command:
            - sh
            - -c
            - >
              until mongosh --quiet "mongodb://demo:demo@mongo-db:27017/admin" --eval "db.adminCommand('ping').ok"; do sleep 2; done;
              mongosh --quiet "mongodb://demo:demo@mongo-db:27017/catalog?authSource=admin" --eval "db.products.updateOne({sku: 'sku-1'}, {\$set: {name: 'seed-product', price: 42}}, {upsert: true})";
