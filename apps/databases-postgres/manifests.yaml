apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  labels:
    app.kubernetes.io/name: postgres-db
    app.kubernetes.io/part-of: progressive-sync-poc
spec:
  selector:
    app.kubernetes.io/name: postgres-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  labels:
    app.kubernetes.io/name: postgres-db
    app.kubernetes.io/part-of: progressive-sync-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-db
        app.kubernetes.io/part-of: progressive-sync-poc
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: orders
            - name: POSTGRES_USER
              value: demo
            - name: POSTGRES_PASSWORD
              value: demo
          ports:
            - containerPort: 5432
              name: postgres
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U demo -d orders"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U demo -d orders"]
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-db-seed
  labels:
    app.kubernetes.io/name: postgres-db-seed
    app.kubernetes.io/part-of: progressive-sync-poc
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-db-seed
        app.kubernetes.io/part-of: progressive-sync-poc
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              value: demo
          command:
            - sh
            - -c
            - >
              until pg_isready -h postgres-db -U demo -d orders; do sleep 2; done;
              psql -h postgres-db -U demo -d orders -c "create table if not exists customers (id serial primary key, name text not null);";
              psql -h postgres-db -U demo -d orders -c "insert into customers (name) select 'seed-customer' where not exists (select 1 from customers where name = 'seed-customer');";
