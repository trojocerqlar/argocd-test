fullnameOverride: inventory-outbox
replicaCount: 1
service:
  type: ClusterIP
serverBlock: |-
  server {
    listen 0.0.0.0:8080;
    location / {
      default_type text/plain;
      return 200 "inventory-outbox ready\n";
    }
  }
resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi
